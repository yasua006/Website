<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Set the character set to UTF-8 for proper text encoding -->
  <meta charset="UTF-8">

  <!-- Enable responsive design by setting the viewport width to the device width -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Link to an external CSS for consistent design -->
  <link rel="stylesheet" href="design.css">

  <!-- Favicon (website icon), SVG = vector graphics = icon, avatar etc. -->
  <link rel="icon" type="image/svg+xml" href="logofolder/logoprosjekt.svg">

  <!-- Title of the webpage -->
  <title>My Website</title>
</head>

<body>

  <!-- Header section containing the website logo and navigation menu -->
  <header>
    <!-- Logo container with an image of the website logo -->
    <div class="logo">
       <!-- AVIF = copyright free = images -->
      <img src="logofolder/logoprosjekt.avif" alt="Website logo">
    </div>

    <!-- Navigation menu with links to different sections of the website -->
    <!-- (ul) unordered list, and (ol) ordered list -->
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Portfolio</a></li>
    <!-- target="_blank" opens the link in a new tab. rel="noopener noreferrer" enhances security and privacy. -->
        <li><a href="aboutme.html" target="_blank" rel="noopener noreferrer">About Me</a></li>
        <li><a href="contact.html" target="_blank" rel="noopener noreferrer">Contact Me</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content section of the webpage -->
  <main>
    <!-- Introduction section with a welcome message and description -->
    <section class="intro">
      <h1>Welcome to my website!</h1>
      <p>Explore our projects and learn more about HTML and CSS.</p>
    </section>

    <!-- Portfolio section where projects can be showcased -->
    <section class="portfolio">
      <h2>Portfolio</h2>

    </section>
  </main>

  <!-- Footer section containing copyright information -->
  <footer>
    <p>&copy; 2023 My Website. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
