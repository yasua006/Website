<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <!-- Set favicon for the website -->
    <link rel="icon" type="image/svg+xml" href="logofolder/logoprosjekt.svg">
    <!-- Link to external stylesheet for styling -->
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <!-- Contact Form Section (spammable and unprotected) -->
    <div class="contact-form">
        <!-- Formspree Contact Form (Note: This form is spammable and unprotected!) -->
        <form action="https://formspree.io/f/mnqenayk" method="POST">
            <!-- Input for Name -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required aria-label="Your Name">

            <!-- Input for Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required aria-label="Your Email">

            <!-- Textarea for Message -->
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required aria-label="Your Message"></textarea>

            <!-- Submit Button -->
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
