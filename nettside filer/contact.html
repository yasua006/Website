<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="icon" type="image/svg+xml" href="logofolder/logoprosjekt.svg">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <!-- Contact Form Section (without server side, back and front end) -->
    <div class="contact-form">
        <!-- Formspree Contact Form (spammable, and unprotected!) -->
        <form action="https://formspree.io/f/mnqenayk" method="POST">

            <!-- Introduction section -->
            <div class="intro-section">
                <h1>Welcome to Our Contact Form</h1>
                <p>We value your feedback and inquiries. Please use the form below to get in touch with us.</p>
            </div>

            <!-- Input for Name -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required aria-label="Your Name">

            <!-- Input for Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required aria-label="Your Email">

            <!-- Textarea for Message -->
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required aria-label="Your Message"></textarea>

            <!-- Submit Button -->
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
